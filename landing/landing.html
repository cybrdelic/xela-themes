<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xela Themes - VS Code Theme Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --text-dim: #888888;
            --accent: #00ff88;
            --border: #222222;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--text);
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 8rem 4rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 0.95;
            margin-bottom: 2rem;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-dim);
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .cta {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .gallery {
            padding: 4rem;
            max-width: 1800px;
            margin: 0 auto;
        }

        .gallery-header {
            margin-bottom: 4rem;
        }

        .gallery-header h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
        }

        .theme-card {
            background: #111111;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
        }

        .theme-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .theme-image {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            display: block;
        }

        .theme-info {
            padding: 1.5rem;
        }

        .theme-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .theme-description {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            padding: 4rem;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 1200px;
            width: 100%;
        }

        .modal-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .close-modal {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: none;
            border: none;
            color: var(--text);
            font-size: 2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-dim);
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem 2rem;
            }

            .hero {
                padding: 6rem 2rem 2rem;
            }

            .gallery {
                padding: 2rem;
            }

            .theme-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .modal {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">XELA</div>
        <nav>
            <a href="#themes">Themes</a>
            <a href="https://github.com/cybrdelic/xela-themes" target="_blank">GitHub</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Premium VS Code<br>Themes</h1>
        <p>A curated collection of 60+ meticulously crafted themes designed for developers who value aesthetics and functionality.</p>
        <a href="#themes" class="cta">Browse Themes</a>
    </section>

    <section class="gallery" id="themes">
        <div class="gallery-header">
            <h2>Explore Themes</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All Themes</button>
                <button class="filter-btn" data-filter="dark">Dark</button>
                <button class="filter-btn" data-filter="light">Light</button>
            </div>
        </div>
        <div class="theme-grid" id="themeGrid">
            <div class="loading">Loading themes...</div>
        </div>
    </section>

    <div class="modal" id="modal">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        let themes = [];
        let currentFilter = "all";

        async function loadThemes() {
            try {
                const response = await fetch("/landing/themes-manifest.json");
                themes = await response.json();
                renderThemes();
            } catch (error) {
                document.getElementById("themeGrid").innerHTML = "<div class=\"loading\">Error loading themes</div>";
            }
        }

        function renderThemes() {
            const grid = document.getElementById("themeGrid");
            const filtered = currentFilter === "all" 
                ? themes 
                : themes.filter(t => {
                    const name = t.name.toLowerCase();
                    if (currentFilter === "light") {
                        return name.includes("light") || name.includes("crystal") || name.includes("arctic");
                    }
                    return !name.includes("light") && !name.includes("crystal") && !name.includes("arctic");
                });

            grid.innerHTML = filtered.map(theme => `
                <div class="theme-card" onclick="openModal('${theme.id}')">
                    <img class="theme-image" 
                         src="/screenshots-vscode/${theme.id}/${theme.id}-1-code.png" 
                         alt="${theme.displayName}"
                         loading="lazy">
                    <div class="theme-info">
                        <div class="theme-name">${theme.displayName}</div>
                        <div class="theme-description">${theme.description || ""}</div>
                    </div>
                </div>
            `).join("");
        }

        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderThemes();
            });
        });

        function openModal(themeId) {
            const theme = themes.find(t => t.id === themeId);
            if (!theme) return;

            const modal = document.getElementById("modal");
            const content = document.getElementById("modalContent");
            
            content.innerHTML = `
                <img class="modal-image" src="/screenshots-vscode/${theme.id}/${theme.id}-1-code.png" alt="${theme.displayName}">
                <h2>${theme.displayName}</h2>
                <p style="color: var(--text-dim); margin-top: 1rem;">${theme.description || ""}</p>
            `;
            
            modal.classList.add("active");
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("active");
        }

        document.getElementById("modal").addEventListener("click", (e) => {
            if (e.target.id === "modal") closeModal();
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeModal();
        });

        loadThemes();
    </script>
</body>
</html>
